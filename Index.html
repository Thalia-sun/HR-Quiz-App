<style>
:root {
  --gold: #C9A84C;
  --gold-light: #E8C97A;
  --gold-dark: #8B6914;
  --navy: #0D1B2A;
  --navy-mid: #1A2E45;
  --navy-light: #243B55;
  --silver: #B0BEC5;
  --bronze: #CD7F32;
  --cream: #F5F0E8;
  --green: #2ECC71;
  --red: #E74C3C;
  --white: #FFFFFF;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--navy);
  color: var(--cream);
  min-height: 100vh;
  overflow-x: hidden;
}

/* Animated background */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
    radial-gradient(ellipse at 80% 80%, rgba(36,59,85,0.6) 0%, transparent 50%),
    radial-gradient(ellipse at 50% 50%, rgba(13,27,42,1) 0%, transparent 100%);
  z-index: 0;
  pointer-events: none;
}

.container {
  position: relative;
  z-index: 1;
  max-width: 860px;
  margin: 0 auto;
  padding: 20px;
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── HEADER ── */
.header {
  text-align: center;
  padding: 40px 0 30px;
}

.header .badge-icon {
  font-size: 56px;
  display: block;
  margin-bottom: 12px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-8px); }
}

.header h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px,5vw,46px);
  font-weight: 900;
  background: linear-gradient(135deg, var(--gold-light), var(--gold), var(--gold-dark));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  letter-spacing: -0.5px;
  line-height: 1.1;
}

.header p {
  color: var(--silver);
  font-size: 15px;
  margin-top: 10px;
  font-weight: 300;
  letter-spacing: 0.5px;
}

/* ── RANK LADDER ── */
.rank-ladder {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin: 28px 0;
  flex-wrap: wrap;
}

.rank-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  opacity: 0.3;
  transition: all 0.4s;
}

.rank-step.unlocked { opacity: 1; }
.rank-step.current { opacity: 1; transform: scale(1.1); }

.rank-step .icon { font-size: 22px; }

.rank-step .label {
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--silver);
}

.rank-step.current .label { color: var(--gold); }

.rank-connector {
  width: 20px;
  height: 2px;
  background: var(--navy-light);
  margin-top: 18px;
  align-self: flex-start;
}

.rank-connector.filled { background: var(--gold); }

/* ── LEVEL CARDS ── */
.level-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
  gap: 16px;
  margin-top: 16px;
}

.level-card {
  background: var(--navy-mid);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 16px;
  padding: 28px 24px;
  cursor: pointer;
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.level-card::before {
  content: '';
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(201,168,76,0.05), transparent);
  opacity: 0;
  transition: opacity 0.3s;
}

.level-card:hover {
  transform: translateY(-4px);
  border-color: var(--gold);
  box-shadow: 0 12px 40px rgba(201,168,76,0.15);
}

.level-card:hover::before { opacity: 1; }

.level-card.locked {
  opacity: 0.45;
  cursor: not-allowed;
}

.level-card.locked:hover {
  transform: none;
  border-color: rgba(201,168,76,0.2);
  box-shadow: none;
}

.level-card .level-emoji { font-size: 36px; margin-bottom: 12px; }

.level-card .level-name {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--cream);
  margin-bottom: 6px;
}

.level-card .level-desc {
  font-size: 13px;
  color: var(--silver);
  line-height: 1.5;
  font-weight: 300;
}
