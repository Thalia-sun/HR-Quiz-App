<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Quiz Academy</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  background:#0f0f0f;
  color:#f5f0e8;
  font-family:'Inter',sans-serif;
  display:flex;
  justify-content:center;
  padding:40px;
}

.app {
  max-width:700px;
  width:100%;
}

h1 {
  font-family:'Playfair Display',serif;
  text-align:center;
  font-size:48px;
}

h1 span { color:#C9A84C; }

.levels {
  display:grid;
  gap:15px;
  margin-top:40px;
}

.level {
  background:#1a1a1a;
  padding:20px;
  border-radius:12px;
  cursor:pointer;
  transition:0.2s;
}

.level:hover {
  transform:translateY(-3px);
  border:1px solid #C9A84C;
}

.card {
  background:#1a1a1a;
  padding:25px;
  border-radius:12px;
}

.question {
  font-size:20px;
  margin-bottom:20px;
}

.answers button {
  width:100%;
  margin:8px 0;
  padding:12px;
  border:none;
  border-radius:8px;
  background:#242424;
  color:white;
  cursor:pointer;
}

.answers button:hover {
  border:1px solid #C9A84C;
}

.correct { background:#4CAF7A; }
.wrong { background:#E05252; }

.next {
  margin-top:15px;
  padding:12px;
  width:100%;
  background:#C9A84C;
  border:none;
  border-radius:8px;
  cursor:pointer;
  display:none;
}
</style>
</head>

<body>

<div class="app">

<div id="home">
  <h1>RRHH <span>Quiz</span></h1>

  <div class="levels">
    <div class="level" onclick="start('easy')">🥉 Grundlagen</div>
    <div class="level" onclick="start('mid')">🥈 Vertiefung</div>
  </div>
</div>

<div id="quiz" style="display:none">
  <div class="card">
    <div id="question" class="question"></div>
    <div id="answers" class="answers"></div>
    <button id="next" class="next">Weiter</button>
  </div>
</div>

</div>

<script>
const data = {
  easy: [
    {
      q: "Was ist strategisches HR?",
      a: ["Verwaltung", "Teil der Unternehmensstrategie", "Nur Recruiting", "IT System"],
      c: 1
    },
    {
      q: "Was bedeutet proaktiv?",
      a: ["Abwarten", "Vorausplanen", "Ignorieren", "Delegieren"],
      c: 1
    }
  ],
  mid: [
    {
      q: "Was ist HR Planung?",
      a: ["Zufällig einstellen", "Richtige Leute zur richtigen Zeit", "Nur Kosten sparen", "Nur Recruiting"],
      c: 1
    }
  ]
};

let level = "";
let index = 0;

function start(l){
  level = l;
  index = 0;
  document.getElementById("home").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  load();
}

function load(){
  const q = data[level][index];
  document.getElementById("question").textContent = q.q;

  const answers = document.getElementById("answers");
  answers.innerHTML = "";

  q.a.forEach((text,i)=>{
    const btn = document.createElement("button");
    btn.textContent = text;

    btn.onclick = ()=>check(i);

    answers.appendChild(btn);
  });

  document.getElementById("next").style.display = "none";
}

function check(i){
  const q = data[level][index];
  const btns = document.querySelectorAll("#answers button");

  btns.forEach((b,idx)=>{
    if(idx===q.c) b.classList.add("correct");
    if(idx===i && idx!==q.c) b.classList.add("wrong");
    b.disabled = true;
  });

  document.getElementById("next").style.display = "block";
}

document.getElementById("next").onclick = ()=>{
  index++;
  if(index < data[level].length){
    load();
  } else {
    alert("Level geschafft");
    location.reload();
  }
};
</script>

</body>
</html>
