<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Manager Academy – RRHH Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --gold-dark: #8B6914;
    --navy: #0D1B2A;
    --navy-mid: #1A2E45;
    --navy-light: #243B55;
    --silver: #B0BEC5;
    --bronze: #CD7F32;
    --cream: #F5F0E8;
    --green: #2ECC71;
    --red: #E74C3C;
    --white: #FFFFFF;
  }

- { margin: 0; padding: 0; box-sizing: border-box; }

body {
font-family: ‘DM Sans’, sans-serif;
background: var(–navy);
color: var(–cream);
min-height: 100vh;
overflow-x: hidden;
}

/* Animated background */
body::before {
content: ‘’;
position: fixed;
inset: 0;
background:
radial-gradient(ellipse at 20% 20%, rgba(201,168,76,0.08) 0%, transparent 50%),
radial-gradient(ellipse at 80% 80%, rgba(36,59,85,0.6) 0%, transparent 50%),
radial-gradient(ellipse at 50% 50%, rgba(13,27,42,1) 0%, transparent 100%);
z-index: 0;
pointer-events: none;
}

.container {
position: relative;
z-index: 1;
max-width: 860px;
margin: 0 auto;
padding: 20px;
}

/* ── SCREENS ── */
.screen { display: none; }
.screen.active { display: block; }

/* ── HEADER ── */
.header {
text-align: center;
padding: 40px 0 30px;
}
.header .badge-icon {
font-size: 56px;
display: block;
margin-bottom: 12px;
animation: float 3s ease-in-out infinite;
}
@keyframes float {
0%,100% { transform: translateY(0); }
50% { transform: translateY(-8px); }
}
.header h1 {
font-family: ‘Playfair Display’, serif;
font-size: clamp(28px,5vw,46px);
font-weight: 900;
background: linear-gradient(135deg, var(–gold-light), var(–gold), var(–gold-dark));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
letter-spacing: -0.5px;
line-height: 1.1;
}
.header p {
color: var(–silver);
font-size: 15px;
margin-top: 10px;
font-weight: 300;
letter-spacing: 0.5px;
}

/* ── RANK LADDER ── */
.rank-ladder {
display: flex;
justify-content: center;
gap: 6px;
margin: 28px 0;
flex-wrap: wrap;
}
.rank-step {
display: flex;
flex-direction: column;
align-items: center;
gap: 4px;
opacity: 0.3;
transition: all 0.4s;
}
.rank-step.unlocked { opacity: 1; }
.rank-step.current { opacity: 1; transform: scale(1.1); }
.rank-step .icon { font-size: 22px; }
.rank-step .label {
font-size: 9px;
font-weight: 600;
letter-spacing: 0.8px;
text-transform: uppercase;
color: var(–silver);
}
.rank-step.current .label { color: var(–gold); }
.rank-connector {
width: 20px;
height: 2px;
background: var(–navy-light);
margin-top: 11px;
align-self: flex-start;
margin-top: 18px;
}
.rank-connector.filled { background: var(–gold); }

/* ── LEVEL CARDS ── */
.level-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
gap: 16px;
margin-top: 16px;
}
.level-card {
background: var(–navy-mid);
border: 1px solid rgba(201,168,76,0.2);
border-radius: 16px;
padding: 28px 24px;
cursor: pointer;
transition: all 0.3s;
position: relative;
overflow: hidden;
}
.level-card::before {
content: ‘’;
position: absolute;
inset: 0;
background: linear-gradient(135deg, rgba(201,168,76,0.05), transparent);
opacity: 0;
transition: opacity 0.3s;
}
.level-card:hover { transform: translateY(-4px); border-color: var(–gold); box-shadow: 0 12px 40px rgba(201,168,76,0.15); }
.level-card:hover::before { opacity: 1; }
.level-card.locked { opacity: 0.45; cursor: not-allowed; }
.level-card.locked:hover { transform: none; border-color: rgba(201,168,76,0.2); box-shadow: none; }
.level-card .level-emoji { font-size: 36px; margin-bottom: 12px; }
.level-card .level-name {
font-family: ‘Playfair Display’, serif;
font-size: 20px;
font-weight: 700;
color: var(–cream);
margin-bottom: 6px;
}
.level-card .level-desc {
font-size: 13px;
color: var(–silver);
line-height: 1.5;
font-weight: 300;
}
.level-card .level-badge {
position: absolute;
top: 14px;
right: 14px;
font-size: 11px;
font-weight: 600;
letter-spacing: 0.8px;
padding: 4px 10px;
border-radius: 20px;
text-transform: uppercase;
}
.badge-easy { background: rgba(46,204,113,0.2); color: var(–green); border: 1px solid rgba(46,204,113,0.3); }
.badge-medium { background: rgba(201,168,76,0.2); color: var(–gold); border: 1px solid rgba(201,168,76,0.3); }
.badge-hard { background: rgba(231,76,60,0.2); color: var(–red); border: 1px solid rgba(231,76,60,0.3); }
.badge-expert { background: rgba(176,190,197,0.2); color: #E0E0E0; border: 1px solid rgba(176,190,197,0.3); }
.badge-locked { background: rgba(255,255,255,0.05); color: var(–silver); border: 1px solid rgba(255,255,255,0.1); }

.stars { margin-top: 12px; font-size: 16px; }
.progress-info { font-size: 12px; color: var(–silver); margin-top: 6px; }

/* ── QUIZ SCREEN ── */
.quiz-header {
display: flex;
align-items: center;
justify-content: space-between;
margin-bottom: 28px;
flex-wrap: wrap;
gap: 12px;
}
.quiz-title {
font-family: ‘Playfair Display’, serif;
font-size: 22px;
color: var(–gold);
}
.quiz-meta { display: flex; gap: 16px; align-items: center; }
.pill {
background: var(–navy-mid);
border: 1px solid rgba(201,168,76,0.3);
border-radius: 20px;
padding: 6px 14px;
font-size: 13px;
font-weight: 500;
color: var(–cream);
}
.pill span { color: var(–gold); }

.progress-bar {
width: 100%;
height: 6px;
background: var(–navy-mid);
border-radius: 3px;
margin-bottom: 32px;
overflow: hidden;
}
.progress-fill {
height: 100%;
background: linear-gradient(90deg, var(–gold-dark), var(–gold));
border-radius: 3px;
transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

.question-card {
background: var(–navy-mid);
border: 1px solid rgba(201,168,76,0.15);
border-radius: 20px;
padding: 36px;
margin-bottom: 20px;
position: relative;
}
.question-number {
font-size: 11px;
font-weight: 600;
letter-spacing: 1.5px;
text-transform: uppercase;
color: var(–gold);
margin-bottom: 14px;
}
.question-text {
font-size: clamp(16px,2.5vw,20px);
font-weight: 500;
line-height: 1.55;
color: var(–cream);
}

.answers {
display: grid;
gap: 12px;
margin-bottom: 24px;
}
.answer-btn {
background: var(–navy-mid);
border: 1.5px solid rgba(176,190,197,0.2);
border-radius: 14px;
padding: 18px 22px;
text-align: left;
cursor: pointer;
font-family: ‘DM Sans’, sans-serif;
font-size: 15px;
color: var(–cream);
transition: all 0.25s;
position: relative;
overflow: hidden;
line-height: 1.4;
}
.answer-btn::before {
content: ‘’;
position: absolute;
left: 0; top: 0; bottom: 0;
width: 4px;
background: transparent;
transition: background 0.25s;
}
.answer-btn:hover:not(:disabled) {
border-color: var(–gold);
background: rgba(201,168,76,0.06);
transform: translateX(4px);
}
.answer-btn:hover:not(:disabled)::before { background: var(–gold); }
.answer-btn:disabled { cursor: default; }
.answer-btn.correct { border-color: var(–green); background: rgba(46,204,113,0.08); }
.answer-btn.correct::before { background: var(–green); }
.answer-btn.wrong { border-color: var(–red); background: rgba(231,76,60,0.08); }
.answer-btn.wrong::before { background: var(–red); }
.answer-btn.missed { border-color: var(–green); border-style: dashed; opacity: 0.7; }

.answer-letter {
display: inline-flex;
align-items: center;
justify-content: center;
width: 28px;
height: 28px;
border-radius: 50%;
background: rgba(176,190,197,0.1);
font-size: 12px;
font-weight: 700;
color: var(–silver);
margin-right: 12px;
flex-shrink: 0;
vertical-align: middle;
transition: all 0.25s;
}
.answer-btn.correct .answer-letter { background: rgba(46,204,113,0.2); color: var(–green); }
.answer-btn.wrong .answer-letter { background: rgba(231,76,60,0.2); color: var(–red); }

.explanation {
background: rgba(201,168,76,0.06);
border: 1px solid rgba(201,168,76,0.2);
border-left: 4px solid var(–gold);
border-radius: 0 12px 12px 0;
padding: 16px 20px;
font-size: 14px;
line-height: 1.6;
color: #D4C5A9;
margin-bottom: 20px;
display: none;
animation: fadeIn 0.3s ease;
}
.explanation strong { color: var(–gold); }
@keyframes fadeIn { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

.nav-btns { display: flex; gap: 12px; justify-content: flex-end; }

.btn {
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
font-weight: 600;
padding: 14px 28px;
border-radius: 12px;
border: none;
cursor: pointer;
transition: all 0.25s;
letter-spacing: 0.5px;
}
.btn-primary {
background: linear-gradient(135deg, var(–gold), var(–gold-dark));
color: var(–navy);
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.35); }
.btn-secondary {
background: transparent;
border: 1.5px solid rgba(176,190,197,0.3);
color: var(–silver);
}
.btn-secondary:hover { border-color: var(–silver); color: var(–cream); }

/* ── RESULT SCREEN ── */
.result-screen {
text-align: center;
padding: 40px 20px;
}
.medal-display {
font-size: 100px;
display: block;
margin-bottom: 16px;
animation: medalPop 0.6s cubic-bezier(0.175,0.885,0.32,1.275);
}
@keyframes medalPop {
0% { transform: scale(0) rotate(-15deg); opacity: 0; }
100% { transform: scale(1) rotate(0); opacity: 1; }
}
.result-title {
font-family: ‘Playfair Display’, serif;
font-size: clamp(26px,4vw,40px);
font-weight: 900;
background: linear-gradient(135deg, var(–gold-light), var(–gold));
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
margin-bottom: 10px;
}
.result-rank {
font-size: 18px;
color: var(–silver);
margin-bottom: 30px;
}
.result-rank strong { color: var(–cream); }
.score-ring {
width: 140px;
height: 140px;
border-radius: 50%;
background: conic-gradient(var(–gold) 0%, transparent 0%);
display: flex;
align-items: center;
justify-content: center;
margin: 0 auto 30px;
position: relative;
transition: background 1.2s;
}
.score-ring::before {
content: ‘’;
position: absolute;
inset: 12px;
border-radius: 50%;
background: var(–navy);
}
.score-number {
position: relative;
z-index: 1;
font-family: ‘Playfair Display’, serif;
font-size: 36px;
font-weight: 900;
color: var(–gold);
}
.score-number small {
font-size: 16px;
color: var(–silver);
font-family: ‘DM Sans’, sans-serif;
font-weight: 300;
}
.stats-row {
display: flex;
justify-content: center;
gap: 24px;
margin-bottom: 32px;
flex-wrap: wrap;
}
.stat-box {
background: var(–navy-mid);
border: 1px solid rgba(201,168,76,0.2);
border-radius: 14px;
padding: 18px 24px;
min-width: 110px;
}
.stat-box .stat-val {
font-family: ‘Playfair Display’, serif;
font-size: 28px;
font-weight: 700;
color: var(–cream);
}
.stat-box .stat-label { font-size: 12px; color: var(–silver); margin-top: 4px; }
.rank-up-banner {
background: linear-gradient(135deg, rgba(201,168,76,0.15), rgba(201,168,76,0.05));
border: 1px solid rgba(201,168,76,0.4);
border-radius: 16px;
padding: 20px 28px;
margin-bottom: 28px;
animation: glow 2s ease-in-out infinite;
}
@keyframes glow {
0%,100% { box-shadow: 0 0 20px rgba(201,168,76,0.1); }
50% { box-shadow: 0 0 40px rgba(201,168,76,0.3); }
}
.rank-up-banner p { font-size: 15px; color: var(–gold-light); }
.rank-up-banner strong { font-size: 18px; font-family: ‘Playfair Display’, serif; }
.result-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

/* ── BACK BTN ── */
.back-btn {
background: none;
border: none;
color: var(–silver);
font-family: ‘DM Sans’, sans-serif;
font-size: 14px;
cursor: pointer;
display: flex;
align-items: center;
gap: 6px;
padding: 8px 0;
margin-bottom: 20px;
transition: color 0.2s;
}
.back-btn:hover { color: var(–gold); }

/* ── TOAST ── */
.toast {
position: fixed;
bottom: 30px;
left: 50%;
transform: translateX(-50%) translateY(80px);
background: var(–navy-mid);
border: 1px solid rgba(201,168,76,0.4);
border-radius: 12px;
padding: 14px 24px;
font-size: 14px;
color: var(–cream);
z-index: 999;
transition: transform 0.4s cubic-bezier(0.175,0.885,0.32,1.275);
white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ── CONFETTI ── */
.confetti-piece {
position: fixed;
width: 10px;
height: 10px;
pointer-events: none;
z-index: 1000;
animation: confettiFall linear forwards;
}
@keyframes confettiFall {
0% { transform: translateY(-20px) rotate(0deg); opacity: 1; }
100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}

@media(max-width:600px) {
.question-card { padding: 24px 18px; }
.answer-btn { padding: 14px 16px; font-size: 14px; }
}
</style>

</head>

//  STATE
// ══════════════════════════════════════════════
let state = {
  currentLevel: null,
  currentQ: 0,
  score: 0,
  answered: false,
  results: [], // per-question {correct}
  unlockedLevels: [0], // always unlock first
  completedLevels: {}, // levelId -> stars earned
  currentRank: 0,
};

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
function init() {
  load();
  renderRankLadder();
  renderLevels();
}

function save() {
  localStorage.setItem('hr_quiz_state', JSON.stringify({
    unlockedLevels: state.unlockedLevels,
    completedLevels: state.completedLevels,
    currentRank: state.currentRank,
  }));
}

function load() {
  const s = localStorage.getItem('hr_quiz_state');
  if (s) {
    const d = JSON.parse(s);
    state.unlockedLevels = d.unlockedLevels || [0];
    state.completedLevels = d.completedLevels || {};
    state.currentRank = d.currentRank || 0;
  }
}

// ══════════════════════════════════════════════
//  RENDER HOME
// ══════════════════════════════════════════════
function renderRankLadder() {
  const el = document.getElementById('rank-ladder');
  el.innerHTML = '';
  RANKS.forEach((r, i) => {
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'rank-connector' + (i <= state.currentRank ? ' filled' : '');
      el.appendChild(conn);
    }
    const step = document.createElement('div');
    step.className = 'rank-step' + (i < state.currentRank ? ' unlocked' : '') + (i === state.currentRank ? ' current' : '');
    step.innerHTML = `<span class="icon">${r.icon}</span><span class="label">${r.label}</span>`;
    el.appendChild(step);
  });
}

function renderLevels() {
  const el = document.getElementById('level-grid');
  el.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const unlocked = state.unlockedLevels.includes(i);
    const completed = state.completedLevels[i];
    const card = document.createElement('div');
    card.className = 'level-card' + (unlocked ? '' : ' locked');
    card.onclick = () => unlocked ? startLevel(i) : showToast('🔒 Schließe zuerst das vorherige Level ab!');

    let starsHtml = '';
    if (completed !== undefined) {
      for (let s = 0; s < 4; s++) starsHtml += s < completed ? '⭐' : '☆';
    }

    card.innerHTML = `
      <span class="level-badge ${unlocked ? lv.badgeClass : 'badge-locked'}">${unlocked ? lv.difficulty : '🔒 Gesperrt'}</span>
      <div class="level-emoji">${lv.emoji}</div>
      <div class="level-name">${lv.name}</div>
      <div class="level-desc">${lv.desc}</div>
      ${completed !== undefined ? `<div class="stars">${starsHtml}</div>` : ''}
      <div class="progress-info">${completed !== undefined ? `Beste Medaille: ${lv.medal}` : unlocked ? '10 Fragen · Abzeichen: '+lv.medal : 'Vorheriges Level abschließen'}</div>
    `;
    el.appendChild(card);
  });
}

// ══════════════════════════════════════════════
//  START LEVEL
// ══════════════════════════════════════════════
function startLevel(levelId) {
  const lv = LEVELS[levelId];
  state.currentLevel = levelId;
  state.currentQ = 0;
  state.score = 0;
  state.answered = false;
  state.results = [];

  // Shuffle questions
  lv._shuffled = [...lv.questions].sort(() => Math.random() - 0.5);

  document.getElementById('quiz-level-title').textContent = lv.emoji + ' ' + lv.name;
  document.getElementById('q-total').textContent = lv._shuffled.length;
  document.getElementById('q-score').textContent = '0';

  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const lv = LEVELS[state.currentLevel];
  const q = lv._shuffled[state.currentQ];
  const total = lv._shuffled.length;

  state.answered = false;

  document.getElementById('q-current').textContent = state.currentQ + 1;
  document.getElementById('q-number').textContent = `FRAGE ${state.currentQ + 1} VON ${total}`;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('progress-fill').style.width = ((state.currentQ / total) * 100) + '%';

  const expl = document.getElementById('explanation');
  expl.style.display = 'none';
  expl.innerHTML = '';

  const nextBtn = document.getElementById('next-btn');
  nextBtn.style.display = 'none';

  const container = document.getElementById('answers-container');
  container.innerHTML = '';
  const letters = ['A', 'B', 'C', 'D'];

  // Shuffle answers while tracking correct
  const indices = q.a.map((_, i) => i);
  indices.sort(() => Math.random() - 0.5);
  const shuffledAnswers = indices.map(i => ({ text: q.a[i], origIdx: i }));
  const correctShuffledIdx = shuffledAnswers.findIndex(a => a.origIdx === q.correct);

  shuffledAnswers.forEach((ans, i) => {
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="answer-letter">${letters[i]}</span>${ans.text}`;
    btn.onclick = () => handleAnswer(i, correctShuffledIdx, q.exp);
    container.appendChild(btn);
  });
}

function handleAnswer(selected, correct, explanation) {
  if (state.answered) return;
  state.answered = true;

  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b => b.disabled = true);

  const isCorrect = selected === correct;
  if (isCorrect) {
    state.score++;
    document.getElementById('q-score').textContent = state.score;
    btns[selected].classList.add('correct');
  } else {
    btns[selected].classList.add('wrong');
    btns[correct].classList.add('missed');
  }
  state.results.push({ correct: isCorrect });

  // Show explanation
  const expl = document.getElementById('explanation');
  expl.innerHTML = `<strong>${isCorrect ? '✅ Richtig!' : '❌ Falsch.'}</strong> ${explanation}`;
  expl.style.display = 'block';

  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  const lv = LEVELS[state.currentLevel];
  state.currentQ++;
  if (state.currentQ >= lv._shuffled.length) {
    showResults();
  } else {
    renderQuestion();
  }
}

// ══════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════
function showResults() {
  const lv = LEVELS[state.currentLevel];
  const total = lv._shuffled.length;
  const correct = state.score;
  const pct = Math.round((correct / total) * 100);

  // Determine stars (1–4)
  let starsEarned = 1;
  if (pct >= 90) starsEarned = 4;
  else if (pct >= 75) starsEarned = 3;
  else if (pct >= 50) starsEarned = 2;

  const prevBest = state.completedLevels[state.currentLevel] || 0;
  const newBest = Math.max(prevBest, starsEarned);
  state.completedLevels[state.currentLevel] = newBest;

  // Unlock next level
  let rankedUp = false;
  if (pct >= 50 && !state.unlockedLevels.includes(state.currentLevel + 1) && state.currentLevel + 1 < LEVELS.length) {
    state.unlockedLevels.push(state.currentLevel + 1);
  }

  // Rank up
  const newRankNeeded = lv.rankUnlock;
  if (pct >= 60 && state.currentRank < newRankNeeded) {
    state.currentRank = newRankNeeded;
    rankedUp = true;
  }

  save();

  // Render
  document.getElementById('result-medal').textContent = lv.medal;
  document.getElementById('result-title').textContent = pct >= 90 ? 'Hervorragend! 🎉' : pct >= 70 ? 'Sehr gut! 👏' : pct >= 50 ? 'Bestanden! 👍' : 'Versuch es nochmal 💪';

  const currentRankName = RANKS[state.currentRank].label;
  document.getElementById('result-rank').innerHTML = `Du bist jetzt: <strong>${RANKS[state.currentRank].icon} ${currentRankName}</strong>`;
  document.getElementById('score-number').innerHTML = `${correct}<small>/${total}</small>`;

  // Animate ring
  setTimeout(() => {
    document.getElementById('score-ring').style.background =
      `conic-gradient(var(--gold) ${pct * 3.6}deg, rgba(26,46,69,1) 0deg)`;
  }, 300);

  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = total - correct;
  document.getElementById('stat-pct').textContent = pct + '%';

  const banner = document.getElementById('rank-up-banner');
  if (rankedUp) {
    banner.style.display = 'block';
    document.getElementById('rank-up-text').innerHTML = `🎉 Rang-Aufstieg! Du bist jetzt: <strong>${RANKS[state.currentRank].icon} ${RANKS[state.currentRank].label}</strong>`;
    spawnConfetti();
  } else {
    banner.style.display = 'none';
  }

  showScreen('screen-result');
  if (pct >= 70) spawnConfetti();
}

function retryLevel() {
  startLevel(state.currentLevel);
}

function goHome() {
  renderRankLadder();
  renderLevels();
  showScreen('screen-home');
}

// ══════════════════════════════════════════════
//  UTILITIES
// ══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

function spawnConfetti() {
  const colors = ['#C9A84C','#E8C97A','#2ECC71','#E74C3C','#3498DB','#9B59B6'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random() * 100}vw;
      top: -10px;
      background: ${colors[Math.floor(Math.random() * colors.length)]};
      width: ${6 + Math.random() * 8}px;
      height: ${6 + Math.random() * 8}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '0'};
      animation-duration: ${1.5 + Math.random() * 2}s;
      animation-delay: ${Math.random() * 0.8}s;
    `;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

init();
</script>

</body>
