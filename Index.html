<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HR Manager Academy – RRHH Quiz</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dark:#8B6914;
  --navy:#0D1B2A;--navy-mid:#1A2E45;--navy-light:#243B55;
  --silver:#B0BEC5;--bronze:#CD7F32;--cream:#F5F0E8;
  --green:#2ECC71;--red:#E74C3C;--white:#FFFFFF;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--navy);color:var(--cream);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,rgba(201,168,76,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,rgba(36,59,85,.6) 0%,transparent 50%);z-index:0;pointer-events:none;}
.container{position:relative;z-index:1;max-width:860px;margin:0 auto;padding:20px;}
.screen{display:none;}.screen.active{display:block;}

/* LANG SWITCHER */
.lang-switcher{position:fixed;top:16px;right:16px;z-index:100;display:flex;gap:8px;}
.lang-btn{background:var(–navy-mid);border:1.5px solid rgba(201,168,76,.3);border-radius:20px;padding:7px 14px;cursor:pointer;font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:600;color:var(–silver);transition:all .25s;display:flex;align-items:center;gap:6px;}
.lang-btn:hover,.lang-btn.active{border-color:var(–gold);color:var(–gold);background:rgba(201,168,76,.08);}
.lang-btn .flag{font-size:18px;}

/* HEADER */
.header{text-align:center;padding:40px 0 30px;}
.header .badge-icon{font-size:56px;display:block;margin-bottom:12px;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
.header h1{font-family:‘Playfair Display’,serif;font-size:clamp(28px,5vw,46px);font-weight:900;background:linear-gradient(135deg,var(–gold-light),var(–gold),var(–gold-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;letter-spacing:-.5px;line-height:1.1;}
.header p{color:var(–silver);font-size:15px;margin-top:10px;font-weight:300;letter-spacing:.5px;}

/* RANK LADDER */
.rank-ladder{display:flex;justify-content:center;gap:6px;margin:28px 0;flex-wrap:wrap;}
.rank-step{display:flex;flex-direction:column;align-items:center;gap:4px;opacity:.3;transition:all .4s;}
.rank-step.unlocked{opacity:1;}.rank-step.current{opacity:1;transform:scale(1.1);}
.rank-step .icon{font-size:22px;}
.rank-step .label{font-size:9px;font-weight:600;letter-spacing:.8px;text-transform:uppercase;color:var(–silver);}
.rank-step.current .label{color:var(–gold);}
.rank-connector{width:20px;height:2px;background:var(–navy-light);margin-top:18px;align-self:flex-start;}
.rank-connector.filled{background:var(–gold);}

/* LEVEL CARDS */
.level-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;margin-top:16px;}
.level-card{background:var(–navy-mid);border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:28px 24px;cursor:pointer;transition:all .3s;position:relative;overflow:hidden;}
.level-card::before{content:’’;position:absolute;inset:0;background:linear-gradient(135deg,rgba(201,168,76,.05),transparent);opacity:0;transition:opacity .3s;}
.level-card:hover{transform:translateY(-4px);border-color:var(–gold);box-shadow:0 12px 40px rgba(201,168,76,.15);}
.level-card:hover::before{opacity:1;}
.level-card.locked{opacity:.45;cursor:not-allowed;}
.level-card.locked:hover{transform:none;border-color:rgba(201,168,76,.2);box-shadow:none;}
.level-card .level-emoji{font-size:36px;margin-bottom:12px;}
.level-card .level-name{font-family:‘Playfair Display’,serif;font-size:20px;font-weight:700;color:var(–cream);margin-bottom:6px;}
.level-card .level-desc{font-size:13px;color:var(–silver);line-height:1.5;font-weight:300;}
.level-card .level-badge{position:absolute;top:14px;right:14px;font-size:11px;font-weight:600;letter-spacing:.8px;padding:4px 10px;border-radius:20px;text-transform:uppercase;}
.badge-easy{background:rgba(46,204,113,.2);color:var(–green);border:1px solid rgba(46,204,113,.3);}
.badge-medium{background:rgba(201,168,76,.2);color:var(–gold);border:1px solid rgba(201,168,76,.3);}
.badge-hard{background:rgba(231,76,60,.2);color:var(–red);border:1px solid rgba(231,76,60,.3);}
.badge-expert{background:rgba(176,190,197,.2);color:#E0E0E0;border:1px solid rgba(176,190,197,.3);}
.badge-locked{background:rgba(255,255,255,.05);color:var(–silver);border:1px solid rgba(255,255,255,.1);}
.stars{margin-top:12px;font-size:16px;}
.progress-info{font-size:12px;color:var(–silver);margin-top:6px;}

/* QUIZ */
.quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;flex-wrap:wrap;gap:12px;}
.quiz-title{font-family:‘Playfair Display’,serif;font-size:22px;color:var(–gold);}
.quiz-meta{display:flex;gap:16px;align-items:center;}
.pill{background:var(–navy-mid);border:1px solid rgba(201,168,76,.3);border-radius:20px;padding:6px 14px;font-size:13px;font-weight:500;color:var(–cream);}
.pill span{color:var(–gold);}
.progress-bar{width:100%;height:6px;background:var(–navy-mid);border-radius:3px;margin-bottom:32px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(–gold-dark),var(–gold));border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1);}
.question-card{background:var(–navy-mid);border:1px solid rgba(201,168,76,.15);border-radius:20px;padding:36px;margin-bottom:20px;}
.question-number{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:var(–gold);margin-bottom:14px;}
.question-text{font-size:clamp(16px,2.5vw,20px);font-weight:500;line-height:1.55;color:var(–cream);}
.answers{display:grid;gap:12px;margin-bottom:24px;}
.answer-btn{background:var(–navy-mid);border:1.5px solid rgba(176,190,197,.2);border-radius:14px;padding:18px 22px;text-align:left;cursor:pointer;font-family:‘DM Sans’,sans-serif;font-size:15px;color:var(–cream);transition:all .25s;position:relative;overflow:hidden;line-height:1.4;}
.answer-btn::before{content:’’;position:absolute;left:0;top:0;bottom:0;width:4px;background:transparent;transition:background .25s;}
.answer-btn:hover:not(:disabled){border-color:var(–gold);background:rgba(201,168,76,.06);transform:translateX(4px);}
.answer-btn:hover:not(:disabled)::before{background:var(–gold);}
.answer-btn:disabled{cursor:default;}
.answer-btn.correct{border-color:var(–green);background:rgba(46,204,113,.08);}
.answer-btn.correct::before{background:var(–green);}
.answer-btn.wrong{border-color:var(–red);background:rgba(231,76,60,.08);}
.answer-btn.wrong::before{background:var(–red);}
.answer-btn.missed{border-color:var(–green);border-style:dashed;opacity:.7;}
.answer-letter{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:50%;background:rgba(176,190,197,.1);font-size:12px;font-weight:700;color:var(–silver);margin-right:12px;flex-shrink:0;vertical-align:middle;transition:all .25s;}
.answer-btn.correct .answer-letter{background:rgba(46,204,113,.2);color:var(–green);}
.answer-btn.wrong .answer-letter{background:rgba(231,76,60,.2);color:var(–red);}
.explanation{background:rgba(201,168,76,.06);border:1px solid rgba(201,168,76,.2);border-left:4px solid var(–gold);border-radius:0 12px 12px 0;padding:16px 20px;font-size:14px;line-height:1.6;color:#D4C5A9;margin-bottom:20px;display:none;animation:fadeIn .3s ease;}
.explanation strong{color:var(–gold);}
@keyframes fadeIn{from{opacity:0;transform:translateY(-6px);}to{opacity:1;transform:translateY(0);}}
.nav-btns{display:flex;gap:12px;justify-content:flex-end;}

/* BUTTONS */
.btn{font-family:‘DM Sans’,sans-serif;font-size:14px;font-weight:600;padding:14px 28px;border-radius:12px;border:none;cursor:pointer;transition:all .25s;letter-spacing:.5px;}
.btn-primary{background:linear-gradient(135deg,var(–gold),var(–gold-dark));color:var(–navy);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(201,168,76,.35);}
.btn-secondary{background:transparent;border:1.5px solid rgba(176,190,197,.3);color:var(–silver);}
.btn-secondary:hover{border-color:var(–silver);color:var(–cream);}
.btn-cert{background:linear-gradient(135deg,#2ECC71,#27AE60);color:#fff;}
.btn-cert:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(46,204,113,.35);}

/* RESULT */
.result-screen{text-align:center;padding:40px 20px;}
.medal-display{font-size:100px;display:block;margin-bottom:16px;animation:medalPop .6s cubic-bezier(.175,.885,.32,1.275);}
@keyframes medalPop{0%{transform:scale(0) rotate(-15deg);opacity:0;}100%{transform:scale(1) rotate(0);opacity:1;}}
.result-title{font-family:‘Playfair Display’,serif;font-size:clamp(26px,4vw,40px);font-weight:900;background:linear-gradient(135deg,var(–gold-light),var(–gold));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:10px;}
.result-rank{font-size:18px;color:var(–silver);margin-bottom:30px;}
.result-rank strong{color:var(–cream);}
.score-ring{width:140px;height:140px;border-radius:50%;background:conic-gradient(var(–gold) 0%,transparent 0%);display:flex;align-items:center;justify-content:center;margin:0 auto 30px;position:relative;transition:background 1.2s;}
.score-ring::before{content:’’;position:absolute;inset:12px;border-radius:50%;background:var(–navy);}
.score-number{position:relative;z-index:1;font-family:‘Playfair Display’,serif;font-size:36px;font-weight:900;color:var(–gold);}
.score-number small{font-size:16px;color:var(–silver);font-family:‘DM Sans’,sans-serif;font-weight:300;}
.stats-row{display:flex;justify-content:center;gap:24px;margin-bottom:32px;flex-wrap:wrap;}
.stat-box{background:var(–navy-mid);border:1px solid rgba(201,168,76,.2);border-radius:14px;padding:18px 24px;min-width:110px;}
.stat-box .stat-val{font-family:‘Playfair Display’,serif;font-size:28px;font-weight:700;color:var(–cream);}
.stat-box .stat-label{font-size:12px;color:var(–silver);margin-top:4px;}
.rank-up-banner{background:linear-gradient(135deg,rgba(201,168,76,.15),rgba(201,168,76,.05));border:1px solid rgba(201,168,76,.4);border-radius:16px;padding:20px 28px;margin-bottom:28px;animation:glow 2s ease-in-out infinite;}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(201,168,76,.1);}50%{box-shadow:0 0 40px rgba(201,168,76,.3);}}
.rank-up-banner p{font-size:15px;color:var(–gold-light);}
.rank-up-banner strong{font-size:18px;font-family:‘Playfair Display’,serif;}
.cert-preview{background:var(–navy-mid);border:1px solid rgba(201,168,76,.3);border-radius:16px;padding:20px 24px;margin-bottom:24px;text-align:left;}
.cert-preview h4{color:var(–gold);font-family:‘Playfair Display’,serif;margin-bottom:8px;font-size:16px;}
.cert-preview p{font-size:13px;color:var(–silver);line-height:1.6;}
.cert-preview .cert-tier{font-size:22px;font-weight:700;color:var(–cream);margin-top:6px;}
.result-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}

/* NAME INPUT */
.name-input-wrap{background:var(–navy-mid);border:1px solid rgba(201,168,76,.2);border-radius:16px;padding:24px;margin-bottom:24px;}
.name-input-wrap label{display:block;font-size:13px;color:var(–silver);margin-bottom:8px;letter-spacing:.5px;}
.name-input{width:100%;background:var(–navy);border:1.5px solid rgba(201,168,76,.3);border-radius:10px;padding:14px 16px;font-family:‘DM Sans’,sans-serif;font-size:16px;color:var(–cream);outline:none;transition:border-color .25s;}
.name-input:focus{border-color:var(–gold);}
.name-input::placeholder{color:rgba(176,190,197,.4);}

/* BACK BTN */
.back-btn{background:none;border:none;color:var(–silver);font-family:‘DM Sans’,sans-serif;font-size:14px;cursor:pointer;display:flex;align-items:center;gap:6px;padding:8px 0;margin-bottom:20px;transition:color .2s;}
.back-btn:hover{color:var(–gold);}

/* TOAST */
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%) translateY(80px);background:var(–navy-mid);border:1px solid rgba(201,168,76,.4);border-radius:12px;padding:14px 24px;font-size:14px;color:var(–cream);z-index:999;transition:transform .4s cubic-bezier(.175,.885,.32,1.275);white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* CONFETTI */
.confetti-piece{position:fixed;width:10px;height:10px;pointer-events:none;z-index:1000;animation:confettiFall linear forwards;}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1;}100%{transform:translateY(100vh) rotate(720deg);opacity:0;}}

/* COPYRIGHT */
.copyright{text-align:center;padding:30px 0 10px;font-size:12px;color:rgba(176,190,197,.5);letter-spacing:.5px;}

@media(max-width:600px){.question-card{padding:24px 18px;}.answer-btn{padding:14px 16px;font-size:14px;}.lang-switcher{top:8px;right:8px;}}
</style>

</head>

let lang = 'de';
let state = {
  currentLevel: null,
  currentQ: 0,

function setLang(l) {

  document.getElementById('btn-de').classList.toggle('active', l==='de');
  document.getElementById('btn-es').classList.toggle('active', l==='es');

  renderRankLadder();
  renderLevels();
}

function t(key) { return T[lang][key] || T['de'][key] || key; }

function applyTranslations() {
  document.getElementById('home-subtitle').textContent = t('subtitle');

  document.getElementById('next-btn').textContent = t('nextBtn');
  document.getElementById('lbl-correct').textContent = t('lblCorrect');
  document.getElementById('lbl-wrong').textContent = t('lblWrong');

  document.getElementById('cert-preview-desc').textContent = t('certPreviewDesc');

}

// ══════════════════════════════════════════════
//  INIT
// ══════════════════════════════════════════════
function init() {
  load();
  applyTranslations();
  renderRankLadder();
  renderLevels();
}

function save() {
  try {
    localStorage.setItem('hr_quiz_v2', JSON.stringify({
      unlockedLevels: state.unlockedLevels,
      completedLevels: state.completedLevels,
      currentRank: state.currentRank,
    }));
  } catch(e){}
}

function load() {
  try {
    const s = localStorage.getItem('hr_quiz_v2');
    if (s) {
      const d = JSON.parse(s);
      state.unlockedLevels = d.unlockedLevels || [0];
      state.completedLevels = d.completedLevels || {};
      state.currentRank = d.currentRank || 0;
    }
  } catch(e){}
}

// ══════════════════════════════════════════════
//  RENDER HOME
// ══════════════════════════════════════════════
function renderRankLadder() {
  const ranks = t('ranks');
  const el = document.getElementById('rank-ladder');
  el.innerHTML = '';
  ranks.forEach((r, i) => {
    const icons = ['🎓','📋','🗂️','👔','📊','🤝','🏆'];
    if (i > 0) {
      const conn = document.createElement('div');
      conn.className = 'rank-connector' + (i <= state.currentRank ? ' filled' : '');
      el.appendChild(conn);
    }
    const step = document.createElement('div');
    step.className = 'rank-step' + (i < state.currentRank ? ' unlocked' : '') + (i === state.currentRank ? ' current' : '');
    step.innerHTML = `<span class="icon">${icons[i]}</span><span class="label">${r}</span>`;
    el.appendChild(step);
  });
}

function renderLevels() {
  const LEVELS_META = [
    {emoji:'📚',medal:'🥉',badgeClass:'badge-easy',stars:1,rankUnlock:1},
    {emoji:'⚔️',medal:'🥈',badgeClass:'badge-medium',stars:2,rankUnlock:3},
    {emoji:'📐',medal:'🥇',badgeClass:'badge-hard',stars:3,rankUnlock:5},
    {emoji:'👑',medal:'🏆',badgeClass:'badge-expert',stars:4,rankUnlock:6},
  ];
  const difficulties = t('difficulties');
  const levelNames = t('levelNames');
  const levelDesc = t('levelDesc');
  const el = document.getElementById('level-grid');
  el.innerHTML = '';
  LEVELS_META.forEach((lv, i) => {
    const unlocked = state.unlockedLevels.includes(i);
    const completed = state.completedLevels[i];
    const card = document.createElement('div');
    card.className = 'level-card' + (unlocked ? '' : ' locked');
    card.onclick = () => unlocked ? startLevel(i) : showToast(t('toastLocked'));
    let starsHtml = '';
    if (completed !== undefined) {
      for (let s=0;s<4;s++) starsHtml += s < completed ? '⭐' : '☆';
    }
    card.innerHTML = `
      <span class="level-badge ${unlocked ? lv.badgeClass : 'badge-locked'}">${unlocked ? difficulties[i] : '🔒 '+t('locked2')}</span>
      <div class="level-emoji">${lv.emoji}</div>
      <div class="level-name">${levelNames[i]}</div>
      <div class="level-desc">${levelDesc[i]}</div>
      ${completed !== undefined ? `<div class="stars">${starsHtml}</div>` : ''}
      <div class="progress-info">${completed !== undefined ? t('bestMedal')+' '+lv.medal : unlocked ? t('questionsInfo')+' '+lv.medal : t('prevLevel')}</div>
    `;
    el.appendChild(card);
  });
}

// ══════════════════════════════════════════════
//  QUIZ
// ══════════════════════════════════════════════
const LEVELS_META = [
  {emoji:'📚',medal:'🥉',rankUnlock:1},
  {emoji:'⚔️',medal:'🥈',rankUnlock:3},
  {emoji:'📐',medal:'🥇',rankUnlock:5},
  {emoji:'👑',medal:'🏆',rankUnlock:6},
];

function startLevel(levelId) {
  const questions = (lang === 'es' ? QUESTIONS_ES : QUESTIONS_DE)[levelId];
  state.currentLevel = levelId;
  state.currentQ = 0;
  state.score = 0;
  state.answered = false;
  state.results = [];
  state._shuffled = [...questions].sort(() => Math.random() - 0.5);
  const lm = LEVELS_META[levelId];
  const levelNames = t('levelNames');
  document.getElementById('quiz-level-title').textContent = lm.emoji + ' ' + levelNames[levelId];
  document.getElementById('q-total').textContent = state._shuffled.length;
  document.getElementById('q-score').textContent = '0';
  showScreen('screen-quiz');
  renderQuestion();
}

function renderQuestion() {
  const q = state._shuffled[state.currentQ];
  const total = state._shuffled.length;
  state.answered = false;
  document.getElementById('q-current').textContent = state.currentQ + 1;
  document.getElementById('q-number').textContent = t('questionLabel') + ' ' + (state.currentQ+1) + ' ' + t('of') + ' ' + total;
  document.getElementById('q-text').textContent = q.q;
  document.getElementById('progress-fill').style.width = ((state.currentQ/total)*100)+'%';
  const expl = document.getElementById('explanation');
  expl.style.display = 'none'; expl.innerHTML = '';
  document.getElementById('next-btn').style.display = 'none';
  const container = document.getElementById('answers-container');
  container.innerHTML = '';
  const letters = ['A','B','C','D'];
  const indices = q.a.map((_,i)=>i).sort(()=>Math.random()-.5);
  const shuffled = indices.map(i=>({text:q.a[i],origIdx:i}));
  const correctShuffled = shuffled.findIndex(a=>a.origIdx===q.correct);
  shuffled.forEach((ans,i)=>{
    const btn = document.createElement('button');
    btn.className = 'answer-btn';
    btn.innerHTML = `<span class="answer-letter">${letters[i]}</span>${ans.text}`;
    btn.onclick = ()=>handleAnswer(i,correctShuffled,q.exp);
    container.appendChild(btn);
  });
}

function handleAnswer(selected, correct, explanation) {
  if (state.answered) return;
  state.answered = true;
  const btns = document.querySelectorAll('.answer-btn');
  btns.forEach(b=>b.disabled=true);
  const isCorrect = selected === correct;
  if (isCorrect) { state.score++; document.getElementById('q-score').textContent = state.score; btns[selected].classList.add('correct'); }
  else { btns[selected].classList.add('wrong'); btns[correct].classList.add('missed'); }
  state.results.push({correct:isCorrect});
  const expl = document.getElementById('explanation');
  expl.innerHTML = `<strong>${isCorrect ? t('correct') : t('wrong')}</strong> ${explanation}`;
  expl.style.display = 'block';
  document.getElementById('next-btn').style.display = 'block';
}

function nextQuestion() {
  state.currentQ++;
  if (state.currentQ >= state._shuffled.length) showResults();
  else renderQuestion();
}

// ══════════════════════════════════════════════
//  RESULTS
// ══════════════════════════════════════════════
function showResults() {
  const lm = LEVELS_META[state.currentLevel];
  const total = state._shuffled.length;
  const correct = state.score;
  const pct = Math.round((correct/total)*100);
  state.lastPct = pct;
  let starsEarned = 1;
  if (pct>=90) starsEarned=4; else if(pct>=75) starsEarned=3; else if(pct>=50) starsEarned=2;
  const prevBest = state.completedLevels[state.currentLevel]||0;
  state.completedLevels[state.currentLevel] = Math.max(prevBest,starsEarned);
  if (pct>=50 && !state.unlockedLevels.includes(state.currentLevel+1) && state.currentLevel+1<4) state.unlockedLevels.push(state.currentLevel+1);
  let rankedUp = false;
  if (pct>=60 && state.currentRank < lm.rankUnlock) { state.currentRank=lm.rankUnlock; rankedUp=true; }
  save();

  const tiers = t('certTiers');
  const tier = tiers.find(t=>pct>=t.min && pct<=t.max) || tiers[0];
  const levelNames = t('levelNames');
  const resultTitles = t('resultTitles');
  let rtIdx = 0;
  if(pct>=90)rtIdx=3; else if(pct>=70)rtIdx=2; else if(pct>=50)rtIdx=1;
  const ranks = t('ranks');
  const rankIcons = ['🎓','📋','🗂️','👔','📊','🤝','🏆'];

  document.getElementById('result-medal').textContent = lm.medal;
  document.getElementById('result-title').textContent = resultTitles[rtIdx];
  document.getElementById('result-rank').innerHTML = `${t('rankLabel')} <strong>${rankIcons[state.currentRank]} ${ranks[state.currentRank]}</strong>`;
  document.getElementById('score-number').innerHTML = `${correct}<small>/${total}</small>`;
  setTimeout(()=>{
    document.getElementById('score-ring').style.background=`conic-gradient(var(--gold) ${pct*3.6}deg,rgba(26,46,69,1) 0deg)`;
  },300);
  document.getElementById('stat-correct').textContent = correct;
  document.getElementById('stat-wrong').textContent = total-correct;
  document.getElementById('stat-pct').textContent = pct+'%';
  const banner = document.getElementById('rank-up-banner');
  if (rankedUp) { banner.style.display='block'; document.getElementById('rank-up-text').innerHTML=`${t('rankUpText')} <strong>${rankIcons[state.currentRank]} ${ranks[state.currentRank]}</strong>`; }
  else banner.style.display='none';
  document.getElementById('cert-tier-label').textContent = tier.medal + ' ' + tier.title;
  document.getElementById('cert-preview-desc').textContent = t('certPreviewDesc');
  showScreen('screen-result');
  if(pct>=70) spawnConfetti();
}

// ══════════════════════════════════════════════
function downloadCert() {
  const name = document.getElementById('cert-name').value.trim();
  if (!name) { showToast(t('toastNoName')); return; }
  const pct = state.lastPct;
  const tiers = t('certTiers');
  const tier = tiers.find(t=>pct>=t.min && pct<=t.max) || tiers[0];
  const levelNames = t('levelNames');
  const total = state._shuffled ? state._shuffled.length : 10;
  const correct = state.score;
  const today = new Date().toLocaleDateString(lang==='es'?'es-ES':'de-DE',{year:'numeric',month:'long',day:'numeric'});

  const { jsPDF } = window.jspdf;
  const doc = new jsPDF({ orientation:'landscape', unit:'mm', format:'a4' });
  const W=297, H=210;

  // Background
  doc.setFillColor(13,27,42);
  doc.rect(0,0,W,H,'F');

  // Gold border outer
  doc.setDrawColor(201,168,76);
  doc.setLineWidth(2);
  doc.rect(8,8,W-16,H-16);
  // Gold border inner
  doc.setLineWidth(0.5);
  doc.rect(12,12,W-24,H-24);

  // Corner ornaments
  const corners=[[14,14],[W-14,14],[14,H-14],[W-14,H-14]];
  corners.forEach(([cx,cy])=>{
    doc.setFillColor(201,168,76);
    doc.circle(cx,cy,2.5,'F');
  });

  // Top decoration line
  doc.setDrawColor(201,168,76);
  doc.setLineWidth(0.3);
  doc.line(40,38,W-40,38);
  doc.line(40,40,W-40,40);

  // Academy name
  doc.setTextColor(201,168,76);
  doc.setFont('helvetica','bold');
  doc.setFontSize(10);
  doc.text('HR MANAGER ACADEMY', W/2, 52, {align:'center'});

  // Module
  doc.setTextColor(176,190,197);
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.text(t('certModule'), W/2, 60, {align:'center'});

  // Tier medal emoji replacement – use text
  doc.setFont('helvetica','bold');
  doc.setFontSize(28);
  doc.setTextColor(245,240,232);
  doc.text(tier.title.toUpperCase(), W/2, 82, {align:'center'});

  // Decorative rule
  doc.setDrawColor(201,168,76);
  doc.setLineWidth(0.5);
  doc.line(W/2-50,87,W/2+50,87);

  // "Hiermit wird bestätigt / Se certifica que"
  doc.setFont('helvetica','italic');
  doc.setFontSize(10);
  doc.setTextColor(176,190,197);
  const certLine1 = lang==='es' ? 'Se certifica que' : 'Hiermit wird bestätigt, dass';
  doc.text(certLine1, W/2, 96, {align:'center'});

  // Name
  doc.setFont('helvetica','bold');
  doc.setFontSize(22);
  doc.setTextColor(232,201,122);
  doc.text(name, W/2, 110, {align:'center'});

  // Underline name
  const nameWidth = doc.getTextWidth(name);
  doc.setDrawColor(201,168,76);
  doc.setLineWidth(0.4);
  doc.line(W/2-nameWidth/2, 113, W/2+nameWidth/2, 113);

  // Body text
  doc.setFont('helvetica','normal');
  doc.setFontSize(10);
  doc.setTextColor(176,190,197);
  const line2 = t('certHereby');
  const line3 = `"${levelNames[state.currentLevel]}" ${t('certCompleted')}`;
  const line4 = `${correct} ${t('of')} ${total} (${pct}%) ${t('certScored')}`;
  doc.text(line2, W/2, 122, {align:'center'});
  doc.text(line3, W/2, 130, {align:'center'});
  doc.setFont('helvetica','bold');
  doc.setTextColor(201,168,76);
  doc.text(line4, W/2, 138, {align:'center'});

  // Bottom decoration
  doc.setDrawColor(201,168,76);
  doc.setLineWidth(0.3);
  doc.line(40,H-52,W-40,H-52);
  doc.line(40,H-50,W-40,H-50);

  // Signature block left
  doc.setFont('helvetica','normal');
  doc.setFontSize(8);
  doc.setTextColor(176,190,197);
  doc.line(30,H-32,100,H-32);
  doc.text(t('certSigned'), 65, H-27, {align:'center'});
  doc.setFont('helvetica','bold');
  doc.setTextColor(201,168,76);
  doc.text('Sara Manoochehri', 65, H-22, {align:'center'});

  // Date right
  doc.setFont('helvetica','normal');
  doc.setTextColor(176,190,197);
  doc.line(W-100,H-32,W-30,H-32);
  doc.text(t('certDate'), W-65, H-27, {align:'center'});
  doc.setFont('helvetica','bold');
  doc.setTextColor(201,168,76);
  doc.text(today, W-65, H-22, {align:'center'});

  // Score badge center
  doc.setFillColor(201,168,76);
  doc.roundedRect(W/2-18,H-42,36,16,3,3,'F');
  doc.setFont('helvetica','bold');
  doc.setFontSize(12);
  doc.setTextColor(13,27,42);
  doc.text(pct+'%', W/2, H-31, {align:'center'});

  // Copyright
  doc.setFont('helvetica','normal');
  doc.setFontSize(7);
  doc.setTextColor(100,120,140);
  doc.text('© Copyright by Sara Manoochehri | HR Manager Academy', W/2, H-10, {align:'center'});

  const safeName = name.replace(/[^a-zA-Z0-9_\-]/g,'_');
  doc.save(`HR_Academy_Urkunde_${safeName}.pdf`);
  showToast(lang==='es'?'📜 ¡Diploma descargado!':'📜 Urkunde heruntergeladen!');
}

// ══════════════════════════════════════════════
//  NAV
// ══════════════════════════════════════════════
function retryLevel() { startLevel(state.currentLevel); }
function goHome() { renderRankLadder(); renderLevels(); showScreen('screen-home'); }
function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0,0); }
function showToast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2800); }
function spawnConfetti() {
  const colors=['#C9A84C','#E8C97A','#2ECC71','#E74C3C','#3498DB','#9B59B6'];
  for(let i=0;i<60;i++){
    const el=document.createElement('div');
    el.className='confetti-piece';
    el.style.cssText=`left:${Math.random()*100}vw;top:-10px;background:${colors[Math.floor(Math.random()*colors.length)]};width:${6+Math.random()*8}px;height:${6+Math.random()*8}px;border-radius:${Math.random()>.5?'50%':'0'};animation-duration:${1.5+Math.random()*2}s;animation-delay:${Math.random()*.8}s;`;
    document.body.appendChild(el);
    setTimeout(()=>el.remove(),4000);
  }
}

init();
</script>
